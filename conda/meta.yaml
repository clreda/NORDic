{% set name = "nordic" %}
{% set ucname = "NORDic" %}
{% set version = "2.8.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  - url: "https://github.com/sysbio-curie/MaBoSS/archive/refs/tags/v2.6.2.tar.gz"
    sha256: 011b06ebd6b82c039a7bf9b9a93780ef6bc84c07ec68e8a399c90f8ca6500580
    folder: "MaBoSS-2.0"
  - url: "https://files.pythonhosted.org/packages/e5/b7/52a3a85009fdb63b1187418f17f7dfa567e27f39af78efc2ca93b2e8bdfd/mpbn-4.4.tar.gz"
    sha256: f190175a93f5c495b701e9f5ea6bf905ed66210a4d744923e5935ee6a0148412
    folder: "mpbn-4.4"
  - url: "https://files.pythonhosted.org/packages/71/52/ddc50b79a6b89f0681b31aed9e49912f8c45a333e3228fc558d537b859ca/bonesis-0.7.0.tar.gz"
    sha256: 61adec7e27f2267b93c9d95d5e03ad4c68730606de0dd69d8a835a28381070b4
    folder: "bonesis-0.7.0"
  - url: "https://files.pythonhosted.org/packages/04/87/957967ad5c9902a6688b663cd9a0db12d79596484ee3adf916d0f60e00fc/{{ name }}-{{ version }}.tar.gz"
    sha256: 763824b0d1d52eeb7137f5a74493631877ed8c656803f765af960e83f1eebf04
    folder: "{{ ucname }}-{{ version }}"
    
build:
  number: 0
  skip: True  # [py < 38]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - flex
    - bison
    - make
  host:
    - python
    - pip
    - clingo >=5.6.1
    - cmappy >=4.0.1
    - graphviz >=0.20.1
    - matplotlib-base
    - omnipath
    - openpyxl >=3.0.10
    - qnorm >=0.5.1
    - quadprog >=0.1.11
    - scikit-learn >=1.1.2
    - scipy >=1.6.2
    - seaborn >=0.12.1
    - tqdm >=4.62.3
    - numpy >=1.22.4,!=2.0.*,!=2.1.*
  run:
    - python
    - clingo >=5.6.1
    - cmappy >=4.0.1
    - graphviz >=0.20.1
    - matplotlib-base
    - omnipath
    - openpyxl >=3.0.10
    - qnorm >=0.5.1
    - quadprog >=0.1.11
    - scikit-learn >=1.1.2
    - scipy >=1.6.2
    - seaborn >=0.12.1
    - tqdm >=4.62.3
    - numpy >=1.22.4,!=2.0.*,!=2.1.*

test:
  imports:
    - NORDic
    - NORDic.NORDic_DR
    - NORDic.NORDic_DS
    - NORDic.NORDic_NI
    - NORDic.NORDic_PMR
    - NORDic.UTILS

about:
  home: "https://github.com/clreda/NORDic"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "NORDic: a Network-Oriented package for the Repurposing of Drugs"
  doc_url: "https://github.com/clreda/NORDic/blob/main/README.md"
  dev_url: "https://github.com/clreda/NORDic"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - clreda
  identifiers:
    - doi:10.5281/zenodo.7239047
